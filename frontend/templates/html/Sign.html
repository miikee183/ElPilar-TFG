<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Pescadería El Pilar</title>
    <link rel="stylesheet" href="/static/css/General.css?v=3">
    <link rel="stylesheet" href="/static/css/Login.css?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <a href="Inicio.html">
                    <img src="/static/img/LogoPesca.png" alt="Logo El Pilar" class="login-logo">
                </a>
                <h1>Crear Cuenta</h1>
                <p>Únete a la familia de El Pilar para tus pedidos</p>
            </div>
            <form id="sign-form" class="login-form">
                <div class="form-row">
                    <div class="input-group">
                        <label for="nombre">Nombre</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="apellidos">Apellidos</label>
                        <div class="input-wrapper">
                            <i class="fas fa-users"></i>
                            <input type="text" id="apellidos" name="apellidos" placeholder="Tus apellidos" required>
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="ejemplo@gmail.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper" style="position: relative;">
                        <i class="fas fa-lock" style="padding-right: 15px;"></i>
                        <input type="password" id="password" name="password" placeholder="Escribe tu clave..." required
                            style="padding-right: 40px; border-radius: 8px;">
                        <i class="fas fa-eye" id="toggle-pwd"
                            style="position: absolute; right: 15px !important; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--azul-oscuro); left: auto !important;"></i>
                    </div>
                    <div id="password-strength" class="strength-meter">
                        <div class="strength-bar"></div>
                        <span class="strength-text">Seguridad de la contraseña</span>
                    </div>
                </div>
                <button type="submit" class="login-btn">
                    Registrarse <i class="fas fa-user-plus"></i>
                </button>
            </form>
            <div class="login-footer">
                <p>¿Ya tienes cuenta? <a href="Login.html">Inicia Sesión</a></p>
                <a href="Inicio.html" class="back-home">Volver a la web</a>
            </div>
        </div>
    </div>
    <script src="/static/js/Sign.js?v=3"></script>
    <script src="/static/js/Auth.js"></script>
</body>

</html>
